[opener]
edit = [
  { run = 'nvim "$@"', block = true }
]

oil = [
  { run = 'nvim +Oil "$0"', block = true }
]

zathura = [
    { run = 'zathura "$@"', block = true }
]

vlc = [
  { run = 'vlc "$@"', orphan = true }
]

img = [
  { run = 'swayimg "$@"', orphan = true }
]

[open]
prepend_rules = [
  { mime = "application/pdf", use = "zathura" },

  # PDFs → Zathura
  { name = "*.pdf", use = "zathura" },

  # Images → Vimiv
  { mime = "image/*", use = "img" },

  # Videos → VLC
  { mime = "video/*", use = "vlc" },

  # Text files → Neovim
  { mime = "text/*", use = "edit" },

  # Directories → Oil in Neovim
  { mime = "inode/directory", use = "oil" }
]
