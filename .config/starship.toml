# Main format configuration
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$package\
$python\
$nodejs\
$rust\
$golang\
$docker_context\
$line_break\
$character
"""

add_newline = false

# Directory configuration
[directory]
format = "έΦΝ[ $path ](bold green)($style)[$read_only]($read_only_style)"
read_only = "ΎΑμ "
truncation_symbol = "έΑο/"
#truncation_length = 3
#home_symbol = "~"

# Character at prompt
[character]
success_symbol = "[έΦΦέΦΑ](none)"
error_symbol   = "[έΦΦέεΩ](bold red)"
vimcmd_symbol  = "[έΦΦΌατ](bold blue)"

# Username display
[username]
format = "[$user]($style) "
disabled = true
show_always = true

# Hostname for SSH
[hostname]
ssh_only = true
ssh_symbol = "ΎΓυ"
format = "[$ssh_symbol$hostname]($style)"
style = "bold purple"
#disabled = true

# Time display
[time]
time_format = "%R" # Hour:Minute format
format = '[ $time ]($style)'
use_12hr = true

